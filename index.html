<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title></title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=News+Cycle:wght@400;700&family=Pathway+Gothic+One&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #FFE81F;
      --gold-dim: #c8b800;
      --blue-intro: #4db8ff;
    }

    html, body {
      width: 100%; height: 100%;
      background: #000;
      overflow: hidden;
      font-family: 'News Cycle', 'Georgia', serif;
      color: var(--gold);
    }

    /* ── Stars canvas ── */
    #stars {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    /* ── Layers ── */
    .layer {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 1.2s ease;
    }
    .layer.visible { opacity: 1; pointer-events: auto; }
    .layer.hidden  { opacity: 0; pointer-events: none; }

    /* ── Start screen ── */
    #start-screen {
      z-index: 20;
      flex-direction: column;
      gap: 2rem;
      text-align: center;
      cursor: pointer;
    }
    #start-screen.visible { opacity: 1; pointer-events: auto; }

    .start-prompt {
      font-family: 'Pathway Gothic One', sans-serif;
      font-size: clamp(1rem, 3vw, 1.5rem);
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--gold-dim);
      animation: pulse 2.5s ease-in-out infinite;
    }

    .start-title {
      font-family: 'Pathway Gothic One', sans-serif;
      font-size: clamp(3rem, 10vw, 8rem);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--gold);
      text-shadow: 0 0 40px rgba(255, 232, 31, 0.4);
      line-height: 1;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.4; }
      50%       { opacity: 1; }
    }

    /* ── Intro text "A long time ago..." ── */
    #intro-text {
      flex-direction: column;
      text-align: center;
      color: var(--blue-intro);
      font-size: clamp(1.1rem, 2.5vw, 1.8rem);
      font-family: 'News Cycle', serif;
      font-weight: 400;
      letter-spacing: 0.05em;
      line-height: 1.8;
    }

    /* ── Title reveal ── */
    #title-reveal {
      flex-direction: column;
      gap: 0.5rem;
      text-align: center;
    }

    #title-sub {
      font-family: 'Pathway Gothic One', sans-serif;
      font-size: clamp(1rem, 3vw, 2rem);
      letter-spacing: 0.5em;
      text-transform: uppercase;
      color: var(--gold-dim);
    }

    #title-main {
      font-family: 'Pathway Gothic One', sans-serif;
      font-size: clamp(4rem, 16vw, 14rem);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--gold);
      text-shadow:
        0 0 20px rgba(255, 232, 31, 0.8),
        0 0 60px rgba(255, 232, 31, 0.3);
      line-height: 0.9;
      will-change: transform, opacity;
    }

    .title-zoom-out {
      animation: titleZoomOut 5s ease-in forwards !important;
    }

    @keyframes titleZoomOut {
      0%   { transform: scale(1);    opacity: 1; }
      70%  { transform: scale(0.15); opacity: 0.6; }
      100% { transform: scale(0.05); opacity: 0; }
    }

    /* ── Crawl ── */
    #crawl-scene {
      position: fixed;
      inset: 0;
      overflow: hidden;
      perspective: 400px;
      perspective-origin: 50% 90%;
      z-index: 10;
      opacity: 0;
      transition: opacity 1.5s ease;
    }
    #crawl-scene.visible { opacity: 1; }

    #crawl-wrap {
      position: absolute;
      bottom: 0;
      left: 50%;
      height: 0;
      overflow: visible;
      width: var(--crawl-width, min(58%, 680px));
      transform: translateX(-50%) rotateX(22deg);
      transform-origin: bottom center;
    }

    #crawl-content {
      width: 100%;
      text-align: justify;
    }

    #crawl-content.scrolling {
      animation: crawlScroll var(--scroll-duration, 90s) linear forwards;
    }

    /* crawlScroll keyframe injected by JS from physics constants */

    /* Crawl typography */
    #crawl-content h1 {
      font-family: 'Pathway Gothic One', sans-serif;
      font-size: clamp(1.8rem, 4vw, 3rem);
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: var(--gold);
      margin: 3rem 0 1.5rem;
      text-shadow: 0 0 20px rgba(255, 232, 31, 0.5);
    }

    #crawl-content h2 {
      font-family: 'Pathway Gothic One', sans-serif;
      font-size: clamp(1.3rem, 3vw, 2.1rem);
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--gold-dim);
      margin: 2.5rem 0 1rem;
    }

    #crawl-content p {
      font-size: var(--crawl-text-size, clamp(1rem, 2vw, 1.4rem));
      line-height: 1.75;
      color: var(--gold);
      margin-bottom: 1.4rem;
    }

    #crawl-content em {
      color: var(--gold-dim);
      font-style: italic;
    }

    #crawl-content strong {
      color: #fff;
      font-weight: 700;
    }

    #crawl-content hr {
      border: none;
      border-top: 1px solid var(--gold-dim);
      margin: 2rem auto;
      width: 60%;
      opacity: 0.4;
    }

    /* ── Edge vignette for crawl ── */
    .crawl-vignette {
      position: fixed;
      inset: 0;
      z-index: 11;
      pointer-events: none;
      background:
        linear-gradient(to bottom,
          rgba(0,0,0,1)   0%,
          rgba(0,0,0,0)  15%,
          rgba(0,0,0,0)  70%,
          rgba(0,0,0,0.8) 100%
        ),
        linear-gradient(to right,
          rgba(0,0,0,0.9) 0%,
          rgba(0,0,0,0)  20%,
          rgba(0,0,0,0)  80%,
          rgba(0,0,0,0.9) 100%
        );
    }

    /* ── End screen ── */
    #end-screen {
      z-index: 15;
      flex-direction: column;
      gap: 1.5rem;
      text-align: center;
    }

    .end-line {
      font-family: 'Pathway Gothic One', sans-serif;
      font-size: clamp(1.2rem, 4vw, 3rem);
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--gold-dim);
    }

    /* ── YouTube hidden player ── */
    #yt-player-wrap {
      position: fixed;
      top: -10px; left: -10px;
      width: 1px; height: 1px;
      overflow: hidden;
      z-index: -1;
    }
  </style>
</head>
<body>

  <canvas id="stars"></canvas>

  <!-- Start screen -->
  <div id="start-screen" class="layer">
    <div class="start-title" id="start-title-text"></div>
    <div class="start-prompt" id="start-prompt-text">Click anywhere to begin</div>
  </div>

  <!-- "A long time ago..." -->
  <div id="intro-text" class="layer"></div>

  <!-- Title reveal -->
  <div id="title-reveal" class="layer">
    <div id="title-sub"></div>
    <div id="title-main"></div>
  </div>

  <!-- Star Wars crawl -->
  <div class="crawl-vignette"></div>
  <div id="crawl-scene">
    <div id="crawl-wrap">
      <div id="crawl-content"></div>
    </div>
  </div>

  <!-- End screen -->
  <div id="end-screen" class="layer"></div>

  <!-- Hidden YouTube player -->
  <div id="yt-player-wrap"><div id="yt-player"></div></div>

  <!-- Dependencies -->
  <script src="https://www.youtube.com/iframe_api"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
  <script src="config.js"></script>

  <script>
    // ── Starfield ──────────────────────────────────────────────────────────
    (function initStars() {
      const canvas = document.getElementById('stars');
      const ctx = canvas.getContext('2d');
      let stars = [];

      function resize() {
        canvas.width  = window.innerWidth;
        canvas.height = window.innerHeight;
      }

      function createStars(n) {
        stars = [];
        for (let i = 0; i < n; i++) {
          stars.push({
            x:        Math.random() * canvas.width,
            y:        Math.random() * canvas.height,
            r:        Math.random() * 1.4 + 0.2,
            alpha:    Math.random(),
            dAlpha:   (Math.random() - 0.5) * 0.008,
          });
        }
      }

      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        for (const s of stars) {
          s.alpha += s.dAlpha;
          if (s.alpha <= 0 || s.alpha >= 1) s.dAlpha *= -1;
          ctx.beginPath();
          ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(255,255,255,${Math.max(0, Math.min(1, s.alpha))})`;
          ctx.fill();
        }
        requestAnimationFrame(draw);
      }

      resize();
      createStars(320);
      draw();

      window.addEventListener('resize', () => {
        resize();
        createStars(320);
      });
    })();

    // ── Config defaults ────────────────────────────────────────────────────
    const cfg = Object.assign({
      youtubeVideoId: null,
      scrollDuration: 100,
      crawlTitle: 'FAREWELL',
      crawlSubtitle: '',
      showStartScreen: true,
      startPromptText: 'Click anywhere to begin',
      showIntro: true,
      introLines: ['A long time ago in a galaxy far,', 'far away\u2026.'],
      showTitleReveal: true,
      endText: 'May the Force be with you.',
      messageFile: 'MESSAGE.md',
      crawlTextSize: null,
      crawlWidth: null,
    }, typeof CONFIG !== 'undefined' ? CONFIG : {});

    // ── Crawl physics constants ──────────────────────────────────────────
    const CRAWL_START_VH   = 5;      // content starts just below viewport
    const CRAWL_END_VH     = -400;   // content ends well above viewport
    const CRAWL_TOTAL_VH   = CRAWL_START_VH - CRAWL_END_VH; // 355
    const CRAWL_PADDING_VH = 30;     // padding-bottom buffer on crawl content
    const END_TRIGGER_VP   = 0.5;    // trigger end when text passes this viewport fraction
    const FADE_SCROLL_VP   = 2.0;    // extra viewport-heights to scroll during fade-out

    // ── Sequence timing (ms unless noted) ────────────────────────────────
    const FADE_MS          = 1300;   // opacity transition settle time
    const FADE_SETTLE_MS   = 1400;   // wait after fade before next phase
    const INTRO_MS         = 5000;   // intro text display duration
    const TITLE_HOLD_MS    = 1200;   // title visible before zoom-out starts
    const TITLE_ZOOM_MS    = 4800;   // title zoom-out animation duration
    const END_FADE_S       = 3;      // crawl scene fade-out (seconds)
    const END_DELAY_MS     = 2000;   // delay before showing end screen

    // Apply config to DOM
    document.title = cfg.crawlTitle;
    document.getElementById('start-title-text').textContent = cfg.crawlTitle;
    document.getElementById('start-prompt-text').textContent = cfg.startPromptText;
    document.getElementById('title-main').textContent        = cfg.crawlTitle;
    document.getElementById('title-sub').textContent         = cfg.crawlSubtitle;
    // Build end screen lines (endText may be a string or array of strings)
    const endLines = Array.isArray(cfg.endText) ? cfg.endText : [cfg.endText];
    const endScreenEl = document.getElementById('end-screen');
    endLines.forEach(line => {
      const div = document.createElement('div');
      div.className = 'end-line';
      div.textContent = line;
      endScreenEl.appendChild(div);
    });
    document.getElementById('crawl-content').style.setProperty('--scroll-duration', cfg.scrollDuration + 's');
    if (cfg.crawlTextSize) {
      document.getElementById('crawl-content').style.setProperty('--crawl-text-size', cfg.crawlTextSize);
    }
    if (cfg.crawlWidth) {
      document.getElementById('crawl-wrap').style.setProperty('--crawl-width', cfg.crawlWidth);
    }

    // Inject crawl geometry from constants (single source of truth)
    document.getElementById('crawl-content').style.paddingBottom = CRAWL_PADDING_VH + 'vh';
    document.getElementById('crawl-content').style.transform = `translateY(${CRAWL_START_VH}vh)`;
    document.head.appendChild(Object.assign(document.createElement('style'), {
      textContent: `
        @keyframes crawlScroll {
          0%   { transform: translateY(${CRAWL_START_VH}vh); }
          100% { transform: translateY(${CRAWL_END_VH}vh); }
        }`
    }));

    // Build intro lines
    const introEl = document.getElementById('intro-text');
    cfg.introLines.forEach(line => {
      const span = document.createElement('span');
      span.textContent = line;
      introEl.appendChild(span);
    });

    // ── YouTube ────────────────────────────────────────────────────────────
    let ytPlayer = null;

    window.onYouTubeIframeAPIReady = function () {
      if (!cfg.youtubeVideoId) return;
      ytPlayer = new YT.Player('yt-player', {
        videoId: cfg.youtubeVideoId,
        playerVars: {
          autoplay: 0,
          loop: 1,
          playlist: cfg.youtubeVideoId,
          controls: 0,
          modestbranding: 1,
          rel: 0,
        },
      });
    };

    function startMusic() {
      if (ytPlayer && typeof ytPlayer.playVideo === 'function') {
        ytPlayer.playVideo();
      }
    }

    // ── Load markdown ──────────────────────────────────────────────────────
    let markdownReady = false;

    fetch('./' + cfg.messageFile)
      .then(r => r.text())
      .then(md => {
        document.getElementById('crawl-content').innerHTML = marked.parse(md);
        markdownReady = true;
      })
      .catch(() => {
        document.getElementById('crawl-content').innerHTML =
          '<p style="text-align:center">May the Force be with you.</p>';
        markdownReady = true;
      });

    // ── Sequence ───────────────────────────────────────────────────────────
    function show(id)  { document.getElementById(id).classList.add('visible'); }
    function hide(id)  { document.getElementById(id).classList.remove('visible'); }
    function fadeOut(id, cb) {
      const el = document.getElementById(id);
      el.classList.add('hidden');
      el.classList.remove('visible');
      if (cb) setTimeout(cb, FADE_MS);
    }

    let sequenceStarted = false;

    async function startSequence() {
      if (sequenceStarted) return;
      sequenceStarted = true;

      if (cfg.showStartScreen) {
        fadeOut('start-screen');
        startMusic();
        await delay(FADE_SETTLE_MS);
      } else {
        hide('start-screen');
        startMusic();
      }

      if (cfg.showIntro) {
        show('intro-text');
        await delay(INTRO_MS);
        fadeOut('intro-text');
        await delay(FADE_SETTLE_MS);
      }

      if (cfg.showTitleReveal) {
        show('title-reveal');
        await delay(TITLE_HOLD_MS);
        document.getElementById('title-main').classList.add('title-zoom-out');
        document.getElementById('title-sub').style.transition = 'opacity 3s ease';
        document.getElementById('title-sub').style.opacity    = '0';
        await delay(TITLE_ZOOM_MS);
        hide('title-reveal');
      }

      // Wait for markdown if not ready
      while (!markdownReady) await delay(100);

      // Start crawl
      document.getElementById('crawl-scene').classList.add('visible');
      await delay(100); // allow paint
      document.getElementById('crawl-content').classList.add('scrolling');

      // Trigger end screen when the last line of text passes END_TRIGGER_VP of viewport.
      // Animation: translateY(START) → translateY(END) over scrollDuration.
      // scrollHeight includes CRAWL_PADDING_VH, which the offset accounts for.
      // f = ((END_TRIGGER_VP - (START - PADDING)/100) * vh + scrollH) / (TOTAL/100 * vh)
      {
        const vh = window.innerHeight;
        const scrollH = document.getElementById('crawl-content').scrollHeight;
        const offset = END_TRIGGER_VP - (CRAWL_START_VH - CRAWL_PADDING_VH) / 100;
        const fraction = Math.min(1, (offset * vh + scrollH) / (CRAWL_TOTAL_VH / 100 * vh));
        await delay(fraction * cfg.scrollDuration * 1000);
      }

      const crawlContent = document.getElementById('crawl-content');
      const crawlScene   = document.getElementById('crawl-scene');
      const matrix   = new DOMMatrixReadOnly(window.getComputedStyle(crawlContent).transform);
      const currentY = matrix.m42; // px

      // Continue scrolling at the same speed during fade-out
      crawlContent.style.animation = 'none';
      crawlContent.style.transform = `translateY(${currentY}px)`;
      crawlContent.getBoundingClientRect(); // force reflow
      const continueDuration = (FADE_SCROLL_VP / (CRAWL_TOTAL_VH / 100)) * cfg.scrollDuration;
      crawlContent.style.transition = `transform ${continueDuration}s linear`;
      crawlContent.style.transform  = `translateY(${currentY - window.innerHeight * FADE_SCROLL_VP}px)`;

      // Fade crawl out and show end screen
      crawlScene.style.transition = `opacity ${END_FADE_S}s ease`;
      crawlScene.classList.remove('visible');
      await delay(END_DELAY_MS);
      show('end-screen');
    }

    function delay(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    if (cfg.showStartScreen) {
      // Show start screen and wait for user interaction
      show('start-screen');
      document.addEventListener('click',   startSequence, { once: true });
      document.addEventListener('keydown', startSequence, { once: true });
    } else {
      // Auto-start immediately
      hide('start-screen');
      startSequence();
    }
  </script>
</body>
</html>
